name: hero_ie_app
description: "Hospitality Emergency Response and Orchestration - Integrated Ecosystem"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  nearby_connections: ^4.3.0
  google_fonts: ^8.0.2
  http: ^1.6.0
  intl: ^0.20.2
  url_launcher: ^6.2.1
  shared_preferences: ^2.5.5
  go_router: ^17.2.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  video_player: ^2.9.2
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "lib/HERO-IE_ICON.png"
  min_sdk_android: 21 # android min sdk value

flutter:
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - assets/images/
